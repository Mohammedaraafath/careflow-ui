<section id="home" class="hero">

  <div class="overlay">

    <div class="hero-content">

      <!-- Left Content -->
      <div class="hero-left">

        <h4>WELCOME TO GREEN VALLEY HOMESTAY</h4>

        <h1>
          Relax, Stay &
          <br>
          Enjoy Nature
        </h1>

        <p>
          Experience a peaceful stay with comfortable rooms,
          beautiful surroundings, and unforgettable hospitality.
        </p>

        <div class="hero-buttons">

          <button
            class="primary"
            (click)="bookNow()">
            Book Now
          </button>

          <button
            class="secondary"
            (click)="showContact = !showContact">
            Contact Us
          </button>

        </div>

      </div>

      @if(showContact){

      <div class="contact-card">

        <h2>Contact Us</h2>

        <div class="contact-item">
          📞 +91 9876543210
        </div>

        <div class="contact-item">
          📧 info@greenvalleyhomestay.com
        </div>

        <div class="contact-item">
          📍 Ooty, Tamil Nadu
        </div>

        <a
          href="https://wa.me/919876543210"
          target="_blank"
          class="call-btn">
          WhatsApp Us
        </a>

      </div>

      }

    </div>

  </div>

</section>
